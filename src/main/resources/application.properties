spring.application.name=back
server.port=81

# MySQL Connection (estas configs son locales de mi pc)
spring.datasource.url=jdbc:mysql://localhost:3306/imagentickets
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Spring Sessions
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.timeout=90d

# Ruta de almacenamiento de archivos subidos (carpeta Documentos del usuario)
app.upload.dir=${user.home}/Documents/austral-uploads/

# URL base de la aplicacion (cambiar en produccion, ej: https://tickets.australlens.com:81)
app.base-url=https://localhost:81

# Tamano maximo de archivos permitidos
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Cantidad maxima de partes multipart
server.tomcat.max-part-count=200

# SSL / HTTPS - usar el keystore PKCS12 generado en src/main/resources/keystore.p12
spring.ssl.bundle.pem.myhomelab.reload-on-update=true
server.ssl.bundle=mycert
spring.ssl.bundle.pem.mycert.keystore.certificate=file:cert/tickets.crt
spring.ssl.bundle.pem.mycert.keystore.private-key=file:cert/tickets.key

# CORREOS
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tickets@australlens.com
spring.mail.password=myoo razl luoo dijg
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true