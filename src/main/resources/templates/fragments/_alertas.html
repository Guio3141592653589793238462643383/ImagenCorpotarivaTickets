<!-- templates/fragments/_alertas.html -->
<div th:fragment="alertas">
    <!-- Toast de éxito -->
    <div th:if="${mensajeExito}"
         id="toast-exito"
         class="fixed top-4 right-4 bg-green-100 border border-green-200 text-green-800 px-4 py-3 rounded-lg shadow-lg transition-opacity duration-500">
        <p class="text-sm font-medium" th:text="${mensajeExito}"></p>
    </div>

    <!-- Toast de error -->
    <div th:if="${mensajeError}"
         id="toast-error"
         class="fixed top-4 right-4 bg-red-100 border border-red-200 text-red-800 px-4 py-3 rounded-lg shadow-lg transition-opacity duration-500">
        <p class="text-sm font-medium" th:text="${mensajeError}"></p>
    </div>

    <script>
        // Ocultar automáticamente los toasts después de 4 segundos
        setTimeout(() => {
            const toastExito = document.getElementById("toast-exito");
            const toastError = document.getElementById("toast-error");
            if (toastExito) toastExito.style.opacity = "0";
            if (toastError) toastError.style.opacity = "0";
        }, 4000);
    </script>
</div>
