<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil - Austral Lens</title>

    <link th:href="@{/main.css}" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <style>
        :root {
            --surface-1:      #0d1117;
            --surface-2:      #161b22;
            --surface-3:      #21262d;
            --surface-4:      #30363d;

            --border:         #30363d;
            --border-subtle:  #21262d;

            --text-primary:   #f9fafb;
            --text-secondary: #d1d5db;
            --text-muted:     #9ca3af;

            --accent:         #0ea5e9;
            --accent-glow:    rgba(14,165,233,0.12);
        }

        /* Fondo general */
        body {
            background:
                    radial-gradient(800px at 10% 20%, rgba(14,165,233,0.10), transparent 60%),
                    radial-gradient(700px at 90% 80%, rgba(59,130,246,0.08), transparent 60%),
                    linear-gradient(180deg, #020617 0%, #020617 100%);
            color: var(--text-primary);
        }

        /* Navbar */
        nav {
            background: var(--surface-2) !important;
            border-bottom: 1px solid var(--border);
        }

        /* Cards */
        .al-card-soft {
            background: var(--surface-2) !important;
            border: 1px solid var(--border) !important;
            border-radius: 14px;
            transition: all .25s ease;
        }

        .al-card-soft:hover {
            transform: translateY(-2px);
            border-color: rgba(14,165,233,0.35);
            box-shadow:
                    0 0 0 1px rgba(14,165,233,0.12),
                    0 12px 40px rgba(0,0,0,0.45);
        }

        /* Textos */
        .label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .value {
            font-weight: 650;
            font-size: 1rem;
            color: var(--text-primary);
        }

        /* Título */
        .title {
            color: var(--text-primary);
            border-left: 4px solid var(--accent);
            padding-left: .5rem;
        }

        /* Footer */
        footer {
            background: var(--surface-2) !important;
            border-top: 1px solid var(--border);
        }

        footer .sub {
            color: var(--text-muted);
        }
        .nav-link {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
            background: var(--surface-3);
        }
        .nav-link:hover { color: var(--text-primary); border-color: var(--surface-4); }
        .nav-link.danger:hover { color: #f87171; border-color: rgba(248,113,113,0.4); }
    </style>
</head>

<body class="min-h-screen flex flex-col">
<!-- NAVBAR -->
<nav style="background: var(--surface-2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 40;">
    <div style="max-width: 1100px; margin: 0 auto; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between;">

        <img src="/images/logo.png" alt="Logo"
             style="height: 44px; object-fit: contain; filter: brightness(0) invert(1); opacity: 0.9;">

        <div style="display: flex; align-items: center; gap: 8px;">
            <a href="/menu" class="nav-link">Menú</a>
            <a href="/logout" class="nav-link danger">Cerrar sesión</a>

            <div style="position: relative;">
                <button id="btnNotificaciones"
                        class="nav-link"
                        aria-label="Notificaciones"
                        style="padding: 8px 10px; display: flex; align-items: center;">
                    <svg xmlns="http://www.w3.org/2000/svg" style="width:18px;height:18px;"
                         fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                    </svg>
                    <span id="contadorNotificaciones"
                          style="position:absolute;top:-4px;right:-4px;background:#ef4444;
                          color:#fff;font-size:10px;font-weight:700;border-radius:9999px;
                          width:16px;height:16px;display:none;align-items:center;justify-content:center;">
                        0
                    </span>
                </button>

                <div id="dropdownNotificaciones"
                     style="display:none;position:absolute;right:0;top:calc(100% + 8px);
                     width:320px;background:var(--surface-2);border:1px solid var(--border);
                     border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,0.55);overflow:hidden;z-index:50;">

                    <div style="padding:12px 14px;border-bottom:1px solid var(--border);
                         display:flex;justify-content:space-between;align-items:center;">
                        <span style="font-size:.8125rem;font-weight:600;color:var(--text-primary);">Notificaciones</span>
                        <button id="btnMarcarTodas"
                                style="font-size:.75rem;color:var(--accent);background:none;border:none;
                                cursor:pointer;font-family:inherit;"
                                onmouseover="this.style.textDecoration='underline'"
                                onmouseout="this.style.textDecoration='none'">
                            Marcar todas como leídas
                        </button>
                    </div>

                    <div id="listaNotificaciones" style="max-height:300px;overflow-y:auto;font-size:.8125rem;">
                        <div style="padding:16px 14px;color:var(--text-muted);">Sin notificaciones</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- PERFIL -->
<section class="px-6 md:px-16 py-8 max-w-6xl mx-auto">

    <h1 class="text-2xl font-bold mb-6 flex items-center gap-2"
        style="color:var(--al-blue-dark); border-left:4px solid var(--al-blue); padding-left:.5rem;">
        <i class="fas fa-user text-sm"></i>
        Perfil del Usuario
    </h1>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

        <div class="p-4 md:p-6 rounded-lg al-card-soft w-full min-h-[100px]"
             style="background:var(--al-blue-xpale); border:1px solid #cfe7f7;">
            <p class="text-xs md:text-sm text-gray-500">Nombre completo</p>
            <p class="font-bold text-base md:text-lg" style="color:var(--al-blue-dark);"
               th:text="${usuario != null ? usuario.nombre : '—'}"></p>
        </div>

        <div class="p-4 md:p-6 rounded-lg al-card-soft w-full min-h-[100px]"
             style="background:var(--al-blue-xpale); border:1px solid #cfe7f7;">
            <p class="text-xs md:text-sm text-gray-500">Cédula</p>
            <p class="font-bold text-base md:text-lg" style="color:var(--al-blue-dark);"
               th:text="${usuario != null ? usuario.cedula : '—'}"></p>
        </div>

        <div class="p-4 md:p-6 rounded-lg al-card-soft w-full min-h-[100px]"
             style="background:var(--al-blue-xpale); border:1px solid #cfe7f7;">
            <p class="text-xs md:text-sm text-gray-500">Teléfono</p>
            <p class="font-bold text-base md:text-lg" style="color:var(--al-blue-dark);"
               th:text="${usuario != null ? usuario.telefono : '—'}"></p>
        </div>

        <div class="p-4 md:p-6 rounded-lg al-card-soft w-full min-h-[100px]"
             style="background:var(--al-blue-xpale); border:1px solid #cfe7f7;">
            <p class="text-xs md:text-sm text-gray-500">Punto</p>
            <p class="font-bold text-base md:text-lg" style="color:var(--al-blue-dark);"
               th:text="${usuario != null ? usuario.punto : '—'}"></p>
        </div>

        <div class="p-4 md:p-6 rounded-lg al-card-soft w-full min-h-[100px]"
             style="background:var(--al-blue-xpale); border:1px solid #cfe7f7;">
            <p class="text-xs md:text-sm text-gray-500">Cargo</p>
            <p class="font-bold text-base md:text-lg" style="color:var(--al-blue-dark);"
               th:text="${usuario != null ? usuario.cargo : '—'}"></p>
        </div>

        <div class="p-4 md:p-6 rounded-lg al-card-soft w-full min-h-[100px]"
             style="background:var(--al-blue-xpale); border:1px solid #cfe7f7;">
            <p class="text-xs md:text-sm text-gray-500">Ciudad</p>
            <p class="font-bold text-base md:text-lg" style="color:var(--al-blue-dark);"
               th:text="${usuario != null ? usuario.ciudad : '—'}"></p>
        </div>

        <div class="p-4 md:p-6 rounded-lg al-card-soft w-full min-h-[100px] sm:col-span-2 lg:col-span-3"
             style="background:var(--al-blue-xpale); border:1px solid #cfe7f7;">
            <p class="text-xs md:text-sm text-gray-500">Email</p>
            <p class="font-bold text-base md:text-lg" style="color:var(--al-blue-dark);"
               th:text="${usuario != null ? usuario.email : '—'}"></p>
        </div>

    </div>

</section>

<!-- FOOTER -->
<footer class="text-white mt-auto"
        style="background:var(--al-blue-dark);">

    <div class="max-w-6xl mx-auto px-6 py-8 grid md:grid-cols-3 gap-8">
        <div>
            <h3 class="font-bold text-lg">Austral Lens</h3>
            <p class="text-sm text-blue-200">Laboratorio óptico.</p>
        </div>

        <div>
            <h3 class="font-bold text-lg">Soporte</h3>
            <p class="text-sm text-blue-200">IMAGENCORPORATIVA@australlens.com</p>
        </div>
    </div>

    <div style="background:var(--surface-1);border-top:1px solid var(--border-subtle);
         text-align:center;padding:14px 24px;font-size:.75rem;color:var(--text-muted);">
        2026 Austral Lens · Todos los derechos reservados
    </div>

</footer>

</body>
</html>
