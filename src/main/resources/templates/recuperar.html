<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - Centro de Tickets</title>
    <link th:href="@{/main.css}" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --surface-1: #f4f6f9;
            --surface-2: #ffffff;
            --surface-3: #eef1f6;
            --surface-4: #dde2ec;
            --border: #d4dae6;
            --border-focus: #0ea5e9;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --accent: #0ea5e9;
            --accent-dark: #0284c7;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background:
                radial-gradient(800px at 10% 0%, rgba(14,165,233,0.07), transparent 55%),
                radial-gradient(600px at 90% 100%, rgba(56,189,248,0.05), transparent 50%),
                var(--surface-1);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-primary);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-12px); }
        }
        .animate-float { animation: float 3.5s ease-in-out infinite; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--surface-3); }
        ::-webkit-scrollbar-thumb { background: var(--surface-4); border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        input {
            color: var(--text-primary);
            background-color: var(--surface-3);
            caret-color: var(--text-primary);
        }
        input::placeholder { color: var(--text-muted); opacity: 1; }

        /* ── LAYOUT ── */
        .layout {
            min-height: 100vh;
            display: flex;
            flex-direction: row;
        }

        /* ── FORM PANEL ── */
        .form-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1.5rem;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 4px 32px rgba(15,23,42,0.07), 0 1px 4px rgba(15,23,42,0.04);
            transition: border-color 0.3s;
        }
        .card:hover { border-color: rgba(14,165,233,0.35); }

        /* Header */
        .card-header { text-align: center; margin-bottom: 1.75rem; }

        .icon-wrap {
            width: 72px; height: 72px;
            border-radius: 20px;
            border: 1px solid rgba(14,165,233,0.25);
            background: linear-gradient(135deg, rgba(14,165,233,0.08), rgba(56,189,248,0.04));
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 0 24px rgba(14,165,233,0.1);
        }
        .icon-wrap i { font-size: 2rem; color: var(--accent); }

        .card-header h2 {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 0.35rem;
        }
        .card-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Field */
        .field { margin-bottom: 1.25rem; }
        .field label {
            display: block;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 0.45rem;
        }
        .field label span { color: var(--danger); }

        .input-wrap { position: relative; }
        .input-wrap i {
            position: absolute;
            left: 12px; top: 50%;
            transform: translateY(-50%);
            color: var(--accent); font-size: 0.85rem;
            pointer-events: none;
        }
        .input-wrap input {
            width: 100%;
            background: var(--surface-3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.7rem 0.875rem 0.7rem 2.4rem;
            font-size: 0.9rem;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .input-wrap input:focus {
            border-color: var(--border-focus);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(14,165,233,0.1);
        }

        /* Alerts */
        .alert {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1rem;
            text-align: center;
        }
        .alert-success { background: #f0fdf4; border: 1px solid #86efac; color: #15803d; }
        .alert-error   { background: #fef2f2; border: 1px solid #fca5a5; color: #dc2626; }

        /* Button */
        .btn-primary {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 0.85rem;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: filter 0.2s, transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(14,165,233,0.25);
            margin-bottom: 1.25rem;
        }
        .btn-primary:hover { filter: brightness(1.08); box-shadow: 0 6px 20px rgba(14,165,233,0.35); }
        .btn-primary:active { transform: scale(0.98); }

        .back-link {
            display: block;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--accent); }

        /* ── DECORATIVE PANEL ── */
        .deco-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            border-left: 1px solid var(--border);
            background: linear-gradient(160deg, #fff 0%, #eef4fb 100%);
            box-shadow: inset 4px 0 24px rgba(14,165,233,0.04);
        }

        .deco-logo-box {
            position: relative;
            width: 240px; height: 240px;
            border-radius: 2rem;
            border: 1px solid var(--border);
            background: linear-gradient(135deg, #fff, #f0f6fc);
            display: flex; align-items: center; justify-content: center;
            padding: 2rem;
            box-shadow: 0 8px 40px rgba(15,23,42,0.08), 0 2px 8px rgba(15,23,42,0.04);
            margin-bottom: 2.5rem;
        }
        .deco-logo-box::before {
            content: '';
            position: absolute; inset: 0;
            border-radius: 2rem;
            background: radial-gradient(circle at 50% 0%, rgba(14,165,233,0.1), transparent 60%);
        }
        .deco-logo-box img {
            position: relative; z-index: 1;
            height: 100%; width: 100%; object-fit: contain;
        }
        .deco-logo-box i { font-size: 7rem; color: var(--accent); position: relative; z-index: 1; opacity: 0.9; }

        .deco-icons { display: flex; gap: 2.5rem; margin-bottom: 2.5rem; }
        .deco-icons i { font-size: 3rem; color: var(--accent); opacity: 0.85; }

        .deco-text { max-width: 360px; text-align: center; }
        .badge {
            display: block;
            font-size: 0.65rem; font-weight: 700;
            letter-spacing: 0.2em; text-transform: uppercase;
            color: var(--accent); margin-bottom: 0.75rem;
        }
        .deco-text h1 {
            font-size: 2rem; font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.02em; margin-bottom: 0.75rem;
        }
        .deco-text p {
            font-size: 0.9rem; line-height: 1.7;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .deco-panel { display: none; }
            .layout { flex-direction: column; }
        }
    </style>
</head>

<body>

<div class="layout">

    <!-- PANEL FORMULARIO -->
    <div class="form-panel">
        <form th:action="@{/recover}" method="post" class="card">

            <div class="card-header">
                <div class="icon-wrap">
                    <i class="fas fa-key"></i>
                </div>
                <h2>Recuperar contraseña</h2>
                <p>Ingresa tu correo para restablecer acceso al sistema</p>
            </div>

            <!-- Alerts -->
            <div th:if="${message}" class="alert alert-success">
                <span th:text="${message}"></span>
            </div>
            <div th:if="${error}" class="alert alert-error">
                <span th:text="${error}"></span>
            </div>

            <!-- Email -->
            <div class="field">
                <label>Email <span>*</span></label>
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" required placeholder="ejemplo@correo.com">
                </div>
            </div>

            <!-- Botón -->
            <button type="submit" class="btn-primary">
                <i class="fas fa-paper-plane" style="margin-right:0.5rem;"></i>Enviar enlace de recuperación
            </button>

            <a href="/" class="back-link">
                <i class="fas fa-arrow-left" style="margin-right:4px;"></i>Regresar al inicio de sesión
            </a>

        </form>
    </div>

    <!-- PANEL DECORATIVO -->
    <div class="deco-panel">
        <div class="deco-logo-box">
            <img src="/images/logo.png" alt="Logo Laboratorio"
                 onerror="this.style.display='none'; this.parentNode.innerHTML='<i class=\'fas fa-glasses\'></i>'">
        </div>
        <div class="deco-icons">
            <i class="fas fa-palette animate-float"></i>
            <i class="fas fa-image animate-float" style="animation-delay:0.3s;"></i>
            <i class="fas fa-bullhorn animate-float" style="animation-delay:0.6s;"></i>
        </div>
        <div class="deco-text">
            <span class="badge">Austral Lens</span>
            <h1>Imagen Corporativa</h1>
            <p>Ingresa para crear solicitudes, consultar el estado de tus tickets y comunicarte con el equipo de Imagen Corporativa.</p>
        </div>
    </div>

</div>

</body>
</html>
