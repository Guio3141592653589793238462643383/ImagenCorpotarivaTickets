<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - Centro de Tickets</title>
    <link th:href="@{/main.css}" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --surface-1: #0d1117;
            --surface-2: #161b22;
            --surface-3: #21262d;
            --surface-4: #30363d;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #c9d1d9;
            --text-muted: #9aa4af;
            --accent: #0ea5e9;
            --accent-glow: rgba(14,165,233,0.12);
        }

        body {
            background:
                    radial-gradient(720px at 15% 0%, rgba(14,165,233,0.14), transparent 58%),
                    radial-gradient(680px at 90% 18%, rgba(56,189,248,0.08), transparent 55%),
                    var(--surface-1) !important;
            background-attachment: fixed;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .animate-float { animation: float 3.5s ease-in-out infinite; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--surface-2); }
        ::-webkit-scrollbar-thumb { background: var(--surface-4); border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        input, textarea, select {
            color: #ffffff !important;
            -webkit-text-fill-color: #ffffff !important;
            caret-color: #ffffff !important;
            background-color: #21262d !important;
        }
        input::placeholder, textarea::placeholder {
            color: #8b949e !important;
            opacity: 1 !important;
        }
        select option {
            background-color: #21262d;
            color: #ffffff;
        }
    </style>
</head>

<body class="bg-sky-100">

<div class="min-h-screen flex flex-col lg:flex-row">

    <!-- PANEL FORMULARIO -->


    <div class="flex flex-1 items-center justify-center px-6 py-10 lg:px-12"> <form th:action="@{/recover}" method="post" class="w-full max-w-md bg-[#161b22] border border-[#30363d] rounded-2xl shadow-2xl shadow-black/40 p-8 space-y-6" > <!-- Header --> <div class="text-center"> <i class="fas fa-key text-4xl text-[#38bdf8] mb-3"></i> <h2 class="text-2xl font-bold text-white">Recuperar contraseña</h2> <p class="text-sm text-gray-300 mt-1"> Ingresa tu correo para restablecer acceso al sistema </p> </div> <!-- Email --> <div> <label class="block text-gray-300 font-semibold mb-1"> Email <span class="text-red-400">*</span> </label> <input type="email" name="email" required placeholder="ejemplo@correo.com" class="w-full px-4 py-2 border border-[#30363d] bg-[#21262d] text-white placeholder:text-[#8b949e] rounded-lg focus:ring-2 focus:ring-[#0ea5e9] focus:outline-none" /> </div> <!-- Botón --> <button type="submit" class="w-full bg-[#0ea5e9] hover:brightness-110 text-white font-semibold py-2.5 rounded-lg transition-all hover:scale-[1.02] active:scale-95 shadow-lg shadow-[#0ea5e9]/20" > Enviar enlace de recuperación </button> <div th:if="${message}" class="bg-emerald-400/10 border border-emerald-400/25 text-emerald-300 p-3 rounded-lg text-sm text-center"> <span th:text="${message}"></span> </div> <div th:if="${error}" class="bg-red-400/10 border border-red-400/25 text-red-300 p-3 rounded-lg text-sm text-center"> <span th:text="${error}"></span> </div> <!-- Volver login --> <p class="text-center text-sm text-[#9aa4af]"> <a href="/" class="text-[#38bdf8] text-white"> Regresar al inicio de sesión </a> </p> </form> </div>


    <!-- PANEL DERECHO DECORATIVO -->
    <div class="hidden md:flex flex-1 flex-col items-center justify-center border-[#30363d] bg-[#161b22]/80 p-10 text-white shadow-2xl shadow-black/30 backdrop-blur-xl">

            <div class="relative mb-8 flex h-72 w-72 items-center justify-center rounded-[2rem] border border-[#30363d] bg-[#21262d] p-6 shadow-2xl shadow-black/35">
                <div class="absolute inset-0 rounded-[2rem] bg-[radial-gradient(circle_at_50%_0%,rgba(14,165,233,0.18),transparent_58%)]"></div>
                <img src="/images/logo.png"
                     alt="Logo Laboratorio"
                     class="relative z-10 h-full w-full object-contain brightness-0 invert opacity-95">
            </div>

            <div class="mb-8 flex justify-center space-x-8">
                <i class="fas fa-palette text-6xl text-[#38bdf8] opacity-90 animate-float"></i>
                <i class="fas fa-image text-6xl text-[#38bdf8] opacity-90 animate-float" style="animation-delay: 0.3s;"></i>
                <i class="fas fa-bullhorn text-6xl text-[#38bdf8] opacity-90 animate-float" style="animation-delay: 0.6s;"></i>
            </div>

            <div class="max-w-md text-center">
                <p class="text-xs font-bold uppercase tracking-[0.22em] text-[#38bdf8]">
                    Austral Lens
                </p>
                <h1 class="mt-3 text-3xl font-black tracking-tight text-white">
                    Imagen Corporativa
                </h1>
                <p class="mt-3 text-sm leading-6 text-[#9aa4af]">
                    Ingresa para crear solicitudes, consultar el estado de tus tickets y comunicarte con el equipo de Imagen Corporativa.
                </p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
