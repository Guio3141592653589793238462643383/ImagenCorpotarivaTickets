<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Centro de Imagen Corporativa - Austral Lens</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --surface-1: #f4f6f9;
      --surface-2: #ffffff;
      --surface-3: #eef1f6;
      --surface-4: #dde2ec;
      --border: #d4dae6;
      --border-focus: #0ea5e9;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-muted: #64748b;
      --accent: #0ea5e9;
      --accent-dark: #0284c7;
      --accent-glow: rgba(14,165,233,0.12);
      --danger: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background:
        radial-gradient(800px at 10% 0%, rgba(14,165,233,0.07), transparent 55%),
        radial-gradient(600px at 90% 100%, rgba(56,189,248,0.06), transparent 50%),
        var(--surface-1);
      min-height: 100vh;
      color: var(--text-primary);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
    .animate-float { animation: float 3.5s ease-in-out infinite; }

    .layout {
      min-height: 100vh;
      display: flex;
      flex-direction: row-reverse;
    }

    /* ── FORM PANEL ── */
    .form-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-y: auto;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 4px 32px rgba(15,23,42,0.07), 0 1px 4px rgba(15,23,42,0.04);
      transition: border-color 0.3s;
    }
    .card:hover { border-color: rgba(14,165,233,0.35); }

    .card-header { text-align: center; margin-bottom: 1.75rem; }

    .logo-wrap {
      width: 72px; height: 72px;
      border-radius: 16px;
      border: 1px solid rgba(14,165,233,0.25);
      background: linear-gradient(135deg, rgba(14,165,233,0.08), rgba(56,189,248,0.04));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      box-shadow: 0 0 24px rgba(14,165,233,0.1);
    }
    .logo-wrap img { height: 48px; width: 48px; object-fit: contain; }
    .logo-wrap i { font-size: 2rem; color: var(--accent); }

    .badge {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .card-header h2 {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-top: 0.4rem;
    }

    .card-header p {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    .alert {
      border-radius: 12px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .alert-success { background: #f0fdf4; border: 1px solid #86efac; color: #15803d; }
    .alert-error   { background: #fef2f2; border: 1px solid #fca5a5; color: #dc2626; }

    .field { margin-bottom: 1.1rem; }
    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 0.45rem;
    }
    .field label span { color: var(--danger); }

    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      font-size: 0.85rem;
      pointer-events: none;
    }

    input, select {
      width: 100%;
      background: var(--surface-3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.7rem 0.875rem 0.7rem 2.4rem;
      font-size: 0.9rem;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      appearance: none;
    }
    input::placeholder { color: var(--text-muted); }
    input:focus, select:focus {
      border-color: var(--border-focus);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(14,165,233,0.1);
    }
    select option { background: #fff; color: var(--text-primary); }

    /* ── CUSTOM CHECKBOXES ── */
    .check-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      cursor: pointer;
      user-select: none;
    }
    .check-row.habeas { align-items: flex-start; margin-bottom: 1.25rem; }

    /* Ocultar el checkbox nativo */
    .check-row input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    /* Caja visual custom */
    .check-box {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      background: var(--surface-3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .check-box::after {
      content: '';
      display: block;
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) scale(0) translateY(-1px);
      transition: transform 0.15s ease;
    }

    /* Estado hover */
    .check-row:hover .check-box {
      border-color: var(--accent);
      background: rgba(14,165,233,0.06);
    }

    /* Estado checked — activado por JS */
    .check-row.is-checked .check-box {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(14,165,233,0.15);
    }
    .check-row.is-checked .check-box::after {
      transform: rotate(45deg) scale(1) translateY(-1px);
    }

    /* Texto del label */
    .check-label {
      font-size: 0.83rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .habeas .check-label {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0.85rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(14,165,233,0.25);
      margin-bottom: 0.75rem;
    }
    .btn-primary:hover { filter: brightness(1.08); box-shadow: 0 6px 20px rgba(14,165,233,0.35); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; filter: none; }

    .btn-secondary {
      width: 100%;
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.1s;
    }
    .btn-secondary:hover { border-color: var(--accent); background: rgba(14,165,233,0.06); }
    .btn-secondary:active { transform: scale(0.98); }

    /* ── DECORATIVE PANEL ── */
    .deco-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      border-right: 1px solid var(--border);
      background: linear-gradient(160deg, #fff 0%, #eef4fb 100%);
      box-shadow: inset -4px 0 24px rgba(14,165,233,0.04);
    }

    .deco-logo-box {
      position: relative;
      width: 240px; height: 240px;
      border-radius: 2rem;
      border: 1px solid var(--border);
      background: linear-gradient(135deg, #fff, #f0f6fc);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      box-shadow: 0 8px 40px rgba(15,23,42,0.08), 0 2px 8px rgba(15,23,42,0.04);
      margin-bottom: 2.5rem;
    }
    .deco-logo-box::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 2rem;
      background: radial-gradient(circle at 50% 0%, rgba(14,165,233,0.1), transparent 60%);
    }
    .deco-logo-box img {
      position: relative;
      z-index: 1;
      height: 100%;
      width: 100%;
      object-fit: contain;
    }
    .deco-logo-box i { font-size: 7rem; color: var(--accent); position: relative; z-index: 1; opacity: 0.9; }

    .deco-icons { display: flex; gap: 2.5rem; margin-bottom: 2.5rem; }
    .deco-icons i { font-size: 3rem; color: var(--accent); opacity: 0.85; }

    .deco-text { max-width: 360px; text-align: center; }
    .deco-text .badge { display: block; margin-bottom: 0.75rem; }
    .deco-text h1 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    .deco-text p {
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    @media (max-width: 768px) {
      .deco-panel { display: none; }
      .layout { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- PANEL FORMULARIO -->
  <div class="form-panel">
    <form th:action="@{/register}" method="post" class="card">

      <div class="card-header">
        <div class="logo-wrap">
          <img src="/images/logo.png" alt="Logo" onerror="this.style.display='none'; this.parentNode.innerHTML='<i class=\'fas fa-eye\'></i>'">
        </div>
        <p class="badge">Centro de Imagen Corporativa</p>
        <h2>Crear Cuenta</h2>
        <p>Registro en el portal de Austral Lens</p>
      </div>

      <div th:if="${success}" class="alert alert-success">
        <i class="fas fa-check-circle" style="margin-right:4px;"></i><span th:text="${success}"></span>
      </div>
      <div th:if="${error}" class="alert alert-error">
        <i class="fas fa-exclamation-circle" style="margin-right:4px;"></i><span th:text="${error}"></span>
      </div>

      <!-- Nombre -->
      <div class="field">
        <label>Nombre completo <span>*</span></label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" name="nombre" placeholder="Ingrese su nombre completo"
                 pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ ]{3,110}" required>
        </div>
      </div>

      <!-- Teléfono -->
      <div class="field">
        <label>Número de teléfono <span>*</span></label>
        <div class="input-wrap">
          <i class="fas fa-phone"></i>
          <input type="tel" name="telefono" placeholder="Ej: 313 12345678"
                 pattern="[0-9 +\-()]{7,15}" required>
        </div>
      </div>

      <!-- Punto de venta -->
      <div class="field">
        <label>Área / Punto de venta <span>*</span></label>
        <div class="input-wrap">
          <i class="fas fa-store"></i>
          <select required name="punto">
            <option value="">Seleccione un punto</option>
            <option>ADMINISTRATIVO</option><option>ARCHIVO</option><option>BARRANQUILLA</option>
            <option>BODEGA</option><option>BUCARAMANGA</option><option>CALI</option>
            <option>CENTRO</option><option>CHAPINERO</option><option>CHIA</option>
            <option>CUCUTA</option><option>LABORATORIO</option><option>MANIZALES</option>
            <option>MEDELLIN</option><option>NEIVA</option><option>OLAYA</option>
            <option>PEREIRA</option><option>PRINCIPAL</option><option>RIONEGRO</option><option>TUNJA</option>
          </select>
        </div>
      </div>

      <!-- Cargo -->
      <div class="field">
        <label>Cargo <span>*</span></label>
        <div class="input-wrap">
          <i class="fas fa-briefcase"></i>
          <select required name="cargo">
            <option value="">Seleccione un cargo</option>
            <option>ADMINISTRADOR/A</option><option>ANALISTA DE CARTERA</option><option>ASESOR JURIDICO</option>
            <option>ASISTENTE DE AUDITORIA</option><option>ASISTENTE DE CONTABILIDAD</option>
            <option>ASISTENTE DE GERENCIA</option><option>ASISTENTE DE NOMINA</option>
            <option>ASISTENTE DE TALENTO HUMANO</option><option>AUDITOR INTERNO</option>
            <option>AUXILIAR DE ARCHIVO</option><option>AUXILIAR DE BODEGA</option>
            <option>AUXILIAR DE IMAGEN CORPORATIVA</option><option>AUXILIAR DE LABORATORIO</option>
            <option>AUXILIAR DE LABORATORIO - ANTIRREFLEJO</option>
            <option>AUXILIAR DE LABORATORIO - CALL CENTER</option>
            <option>AUXILIAR DE LABORATORIO - CONTROL DE CALIDAD</option>
            <option>AUXILIAR DE LABORATORIO - ENCINTADO</option>
            <option>AUXILIAR DE LABORATORIO - TALLA</option>
            <option>AUXILIAR DE PUNTO DE VENTA</option><option>AUXILIAR DE SERVICIOS GENERALES</option>
            <option>AUXILIAR DE SERVICIOS VARIOS</option><option>BISELADOR/A</option><option>CAJERO</option>
            <option>COORDINADOR DE ARCHIVO Y SUMINISTROS</option><option>COORDINADOR DE BISEL</option>
            <option>COORDINADOR DE BODEGA</option><option>COORDINADOR DE LABORATORIO</option>
            <option>COORDINADORA CONTABLE</option><option>DIRECTOR CIENTIFICO</option>
            <option>DIRECTOR COMERCIAL</option><option>DIRECTORA CONTABLE Y TESORERIA</option>
            <option>DIRECTORA DE GESTION DE MARCA</option><option>DIRECTORA DE HSEQ</option>
            <option>DIRECTORA DE IMAGEN COORPORATIVA</option><option>DIRECTORA DE TALENTO HUMANO</option>
            <option>EJECUTIVO COMERCIAL</option><option>GERENTE ADMINISTRATIVO Y FINANCIERO</option>
            <option>GERENTE COMERCIAL</option><option>JEFE DE BODEGA</option>
            <option>JEFE DE LABORATORIO</option><option>LIDER DE SISTEMAS</option>
            <option>MENSAJERO</option><option>PRESIDENTE</option><option>APRENDIZ</option>
          </select>
        </div>
      </div>

      <!-- Email -->
      <div class="field">
        <label>Email <span>*</span></label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" name="email" placeholder="ejemplo@correo.com" required>
        </div>
      </div>

      <!-- Contraseña -->
      <div class="field">
        <label>Contraseña <span>*</span></label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input id="password" type="password" name="password" placeholder="••••••••" required>
        </div>
      </div>

      <!-- Confirmar contraseña -->
      <div class="field">
        <label>Confirmar contraseña <span>*</span></label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input id="confirmPassword" type="password" name="confirmPassword" placeholder="••••••••" required>
        </div>
      </div>

      <!-- Mostrar contraseña -->
      <label class="check-row" id="togglePassRow">
        <input type="checkbox" id="togglePassCb">
        <span class="check-box"></span>
        <span class="check-label">Mostrar contraseña</span>
      </label>

      <!-- Habeas Data -->
      <label class="check-row habeas" id="habeasRow">
        <input type="checkbox" id="habeasdata" required>
        <span class="check-box"></span>
        <span class="check-label">Autorizo el tratamiento de mis datos personales de acuerdo con la política de privacidad y la legislación de Habeas Data vigente en Colombia.</span>
      </label>

      <!-- Botones -->
      <button type="submit" id="LoginBt" disabled class="btn-primary">
        <i class="fas fa-user-plus" style="margin-right:0.5rem;"></i>Registrarse
      </button>

      <button type="button" onclick="window.location.href='/login'" class="btn-secondary">
        <i class="fas fa-arrow-left" style="margin-right:0.5rem;"></i>Ya tengo cuenta
      </button>

    </form>
  </div>

  <!-- PANEL DECORATIVO -->
  <div class="deco-panel">
    <div class="deco-logo-box">
      <img src="/images/logo.png" alt="Logo Laboratorio"
           onerror="this.style.display='none'; this.parentNode.innerHTML='<i class=\'fas fa-glasses\'></i>'">
    </div>
    <div class="deco-icons">
      <i class="fas fa-palette animate-float"></i>
      <i class="fas fa-image animate-float" style="animation-delay:0.3s;"></i>
      <i class="fas fa-bullhorn animate-float" style="animation-delay:0.6s;"></i>
    </div>
    <div class="deco-text">
      <span class="badge">Austral Lens</span>
      <h1>Imagen Corporativa</h1>
      <p>Regístrate para crear solicitudes, consultar el estado de tus tickets y comunicarte con el equipo de Imagen Corporativa.</p>
    </div>
  </div>

</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {

    /* ── Helper: sincronizar clase visual con estado real del checkbox ── */
    function syncCheckbox(row, cb) {
      cb.checked ? row.classList.add("is-checked") : row.classList.remove("is-checked");
    }

    /* ── Mostrar contraseña ── */
    const togglePassRow = document.getElementById("togglePassRow");
    const togglePassCb  = document.getElementById("togglePassCb");

    togglePassRow.addEventListener("click", function () {
      togglePassCb.checked = !togglePassCb.checked;
      syncCheckbox(togglePassRow, togglePassCb);

      const type = togglePassCb.checked ? "text" : "password";
      document.getElementById("password").type = type;
      document.getElementById("confirmPassword").type = type;
    });

    /* ── Habeas Data ── */
    const habeasRow = document.getElementById("habeasRow");
    const habeasCb  = document.getElementById("habeasdata");
    const loginBtn  = document.getElementById("LoginBt");
    loginBtn.disabled = true;

    habeasRow.addEventListener("click", function () {
      habeasCb.checked = !habeasCb.checked;
      syncCheckbox(habeasRow, habeasCb);
      loginBtn.disabled = !habeasCb.checked;
    });

  });
</script>

<script src="https://cdn.jsdelivr.net/npm/flowbite@2.2.1/dist/flowbite.min.js"></script>
</body>
</html>
