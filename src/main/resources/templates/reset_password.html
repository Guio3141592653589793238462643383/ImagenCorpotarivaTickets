<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - Centro de Tickets</title>
    <link th:href="@{/main.css}" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        body {
            background-image: url('data:image/svg+xml,<svg width="60" height="60" xmlns="http://www.w3.org/2000/svg"><path d="M30 0 L60 30 L30 60 L0 30 Z" fill="%2387ceeb" opacity="0.1"/></svg>');
            background-size: 60px 60px;
        }
    </style>
</head>

<body class="bg-sky-100">

<div class="min-h-screen flex flex-col lg:flex-row">

    <!-- PANEL FORMULARIO -->
    <div class="flex flex-1 items-center justify-center px-6 py-10 lg:px-12">

        <form th:action="@{/reset-password}" method="post"
              onsubmit="return validarPasswords()"
              class="w-full max-w-md bg-white border border-sky-200 rounded-2xl shadow-xl p-8 space-y-6">

            <input type="hidden" name="token" th:value="${token}" />

            <!-- Nueva contraseña -->
            <div>
                <label class="block text-sky-700 font-semibold mb-1">Nueva contraseña</label>
                <input type="password" id="password" name="password" required
                       placeholder="********"
                       class="w-full px-4 py-2 border border-sky-300 rounded-lg focus:ring-2 focus:ring-sky-400 focus:outline-none"/>
            </div>

            <!-- Confirmar contraseña -->
            <div>
                <label class="block text-sky-700 font-semibold mb-1">Confirmar contraseña</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required
                       placeholder="********"
                       class="w-full px-4 py-2 border border-sky-300 rounded-lg focus:ring-2 focus:ring-sky-400 focus:outline-none"/>
            </div>

            <!-- Botón -->
            <button type="submit"
                    class="w-full bg-sky-500 hover:bg-sky-600 text-white font-semibold py-2.5 rounded-lg transition-all hover:scale-[1.02] active:scale-95">
                Cambiar contraseña
            </button>

            <!-- Mensajes -->
            <div th:if="${error}"
                 class="bg-red-100 border border-red-300 text-red-700 p-3 rounded-lg text-sm text-center mt-3">
                <span th:text="${error}"></span>
            </div>

            <div th:if="${message}"
                 class="bg-green-100 border border-green-300 text-green-700 p-3 rounded-lg text-sm text-center mt-3" id="successMsg">
                <span th:text="${message}"></span>
            </div>

            <p id="errorMsg" class="text-red-600 text-sm text-center mt-2"></p>
        </form>

        <script>
            function validarPasswords() {
                const pass = document.getElementById("password").value;
                const confirm = document.getElementById("confirmPassword").value;
                if (pass !== confirm) {
                    document.getElementById("errorMsg").innerText = "Las contraseñas no coinciden.";
                    return false; // evita enviar el formulario
                }
                return true;
            }
        </script>



    </div>


    <!-- PANEL DERECHO DECORATIVO -->
    <div class="hidden lg:flex flex-1 flex-col items-center justify-center bg-gradient-to-br from-sky-400 to-sky-600 text-white p-10">

        <div class="w-64 h-64 bg-white/20 rounded-xl flex items-center justify-center mb-10 backdrop-blur-md p-6">
            <img src="/images/logo.png" alt="Logo Laboratorio" class="w-full h-full object-contain">
        </div>

        <div class="flex space-x-10 mb-8">
            <i class="fas fa-laptop-code text-5xl animate-float"></i>
            <i class="fas fa-server text-5xl animate-float" style="animation-delay: .3s;"></i>
            <i class="fas fa-network-wired text-5xl animate-float" style="animation-delay: .6s;"></i>
        </div>

        <h1 class="text-3xl font-bold text-center">
            Centro de soporte TI
        </h1>

        <p class="text-sm mt-3 text-center opacity-90 max-w-md">
            Recupera el acceso a tu cuenta para continuar gestionando
            tickets y solicitudes de soporte técnico.
        </p>
    </div>


</div>

</body>
</html>
